server:
  port: ${PORT:8080}
  shutdown: graceful

spring:
  application:
    name: llm-proxy
  lifecycle:
    timeout-per-shutdown-phase: 30s

llm:
  primary:
    url: ${LLM_PRIMARY_URL:http://localhost:${server.port}/mock/primary/v1/chat/completions}
  candidate:
    url: ${LLM_CANDIDATE_URL:http://localhost:${server.port}/mock/candidate/v1/chat/completions}
  shadow-enabled: ${LLM_SHADOW_ENABLED:true}
  connect-timeout: ${LLM_CONNECT_TIMEOUT:5s}
  read-timeout: ${LLM_READ_TIMEOUT:30s}
  shadow-read-timeout: ${LLM_SHADOW_READ_TIMEOUT:120s}

logging:
  level:
    com.proxy.llm.service.ComparisonService: INFO
    com.proxy.llm.service.ShadowService: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
